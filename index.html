<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在跳转...</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      background:linear-gradient(135deg,#0f0f0f 0%,#1a1a2e 50%,#16213e 100%);
      color:#e0e0e0;
      font-family:"Microsoft YaHei","PingFang SC",sans-serif;
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;
      overflow:hidden;
    }
    .container{
      text-align:center;
      padding:24px;
      max-width:360px;
      width:100%;
    }
    .logo{
      font-size:64px;
      margin-bottom:20px;
      animation:float 3s ease-in-out infinite;
    }
    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
    }
    .title{
      font-size:22px;
      font-weight:700;
      color:#ffffff;
      margin-bottom:8px;
      letter-spacing:1px;
    }
    .subtitle{
      font-size:13px;
      color:#888;
      margin-bottom:40px;
    }
    .spinner-wrap{
      display:flex;align-items:center;justify-content:center;
      margin-bottom:32px;
    }
    .spinner{
      width:56px;height:56px;
      border:4px solid rgba(100,181,246,0.15);
      border-top:4px solid #64b5f6;
      border-radius:50%;
      animation:spin .9s cubic-bezier(.4,0,.2,1) infinite;
      position:relative;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .hint{
      font-size:15px;
      color:#aaa;
      line-height:1.6;
      margin-bottom:8px;
    }
    .url-preview{
      font-size:12px;
      color:#555;
      margin-top:12px;
      word-break:break-all;
    }
    .url-preview.show{color:#64b5f6;}
    .error{
      font-size:13px;
      color:#f5f5f5;
      margin-top:16px;
      display:none;
    }
  </style>
  <!-- 防缓存 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>
  <div class="container">
    <div class="logo">⏳</div>
    <div class="title">BTR 公会官网</div>
    <div class="subtitle">BTR Guild Official Site</div>
    <div class="spinner-wrap">
      <div class="spinner"></div>
    </div>
    <div class="hint" id="hintText">正在获取地址...</div>
    <div class="url-preview" id="urlPreview"></div>
    <div class="error" id="errorMsg"></div>
  </div>

  <script>
    // 版本检查（强制刷新缓存）
    const CURRENT_VERSION = '3';
    const STORED_VERSION = localStorage.getItem('redirect_page_version');
    if (STORED_VERSION !== CURRENT_VERSION) {
      localStorage.setItem('redirect_page_version', CURRENT_VERSION);
      window.location.reload(true);
    }

    // 获取最新地址并跳转
    fetch('url.txt?t=' + Date.now(), { cache: 'no-store' })
      .then(r => {
        if (!r.ok) throw new Error('无法读取 url.txt');
        return r.text();
      })
      .then(url => {
        url = url.trim();
        if (!url) throw new Error('url.txt 为空');
        
        // 显示 URL
        const urlPreview = document.getElementById('urlPreview');
        if (urlPreview) {
          urlPreview.textContent = url;
          urlPreview.classList.add('show');
        }
        
        // 更新提示
        const hintText = document.getElementById('hintText');
        if (hintText) hintText.textContent = '将在 0.8 秒后跳转...';
        
        // 0.8 秒后跳转
        setTimeout(() => {
          window.location.href = url;
        }, 800);
      })
      .catch(err => {
        // 隐藏 spinner
        const spinner = document.querySelector('.spinner-wrap');
        if (spinner) spinner.style.display = 'none';
        
        // 显示错误
        const hintText = document.getElementById('hintText');
        if (hintText) {
          hintText.textContent = '跳转失败：' + err.message;
          hintText.style.color = '#f5f5f5';
        }
        const errorMsg = document.getElementById('errorMsg');
        if (errorMsg) {
          errorMsg.textContent = '错误信息：' + err.message + '。请稍后重试，或联系管理员。';
          errorMsg.style.display = 'block';
        }
        
        console.error('跳转失败：', err);
      });
  </script>
</body>
</html>
