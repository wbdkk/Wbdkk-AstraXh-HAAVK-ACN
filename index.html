<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BTR公会官网</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:linear-gradient(135deg,#0f0f0f 0%,#1a1a2e 50%,#16213e 100%);
    color:#e0e0e0;
    font-family:"Microsoft YaHei","PingFang SC",sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
    overflow:hidden;
  }
  .container{
    text-align:center;
    padding:24px;
    max-width:360px;
    width:100%;
  }
  /* Logo / 图标 */
  .logo{
    font-size:64px;
    margin-bottom:20px;
    animation:float 3s ease-in-out infinite;
  }
  @keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-10px)}
  }
  /* 标题 */
  .title{
    font-size:22px;
    font-weight:700;
    color:#ffffff;
    margin-bottom:8px;
    letter-spacing:1px;
  }
  /* 副标题 */
  .subtitle{
    font-size:13px;
    color:#888;
    margin-bottom:40px;
  }
  /* 美化 spinner */
  .spinner-wrap{
    display:flex;align-items:center;justify-content:center;
    margin-bottom:32px;
  }
  .spinner{
    width:56px;height:56px;
    border:4px solid rgba(100,181,246,0.15);
    border-top:4px solid #64b5f6;
    border-radius:50%;
    animation:spin .9s cubic-bezier(.4,0,.2,1) infinite;
    position:relative;
  }
  .spinner::after{
    content:'';
    position:absolute;
    inset:4px;
    border:3px solid transparent;
    border-top:3px solid rgba(100,181,246,0.4);
    border-radius:50%;
    animation:spin 1.8s linear infinite reverse;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  /* 提示文字 */
  .hint{
    font-size:15px;
    color:#aaa;
    line-height:1.6;
    margin-bottom:8px;
  }
  /* 网址展示 */
  .url-preview{
    font-size:12px;
    color:#555;
    margin-top:12px;
    word-break:break-all;
    transition:color .3s;
  }
  .url-preview.show{color:#64b5f6;}
  /* 错误提示 */
  .error{
    font-size:13px;
    color:#ff6b6b;
    margin-top:16px;
    display:none;
  }
  /* 底部 */
  .footer{
    position:fixed;bottom:20px;
    width:100%;text-align:center;
    font-size:11px;color:#333;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">⚔️</div>
  <div class="title">BTR 公会官网</div>
  <div class="subtitle">BTR Guild Official Site</div>
  <div class="spinner-wrap">
    <div class="spinner"></div>
  </div>
  <div class="hint">正在跳转至最新地址...</div>
  <div class="url-preview" id="urlPreview"></div>
  <div class="error" id="errorMsg"></div>
</div>
<div class="footer">Powered by BTR Guild · wbdkk.github.io/btr</div>

<script>
fetch('url.txt')
  .then(r => {
    if(!r.ok) throw new Error('url.txt 读取失败');
    return r.text();
  })
  .then(url => {
    url = url.trim();
    if(!url) throw new Error('url.txt 内容为空');
    document.getElementById('urlPreview').textContent = url;
    document.getElementById('urlPreview').classList.add('show');
    // 0.8 秒后跳转，让用户看到地址
    setTimeout(() => { location.href = url; }, 800);
  })
  .catch(err => {
    document.querySelector('.spinner').style.display = 'none';
    document.querySelector('.hint').textContent = '跳转失败';
    document.getElementById('errorMsg').textContent = err.message;
    document.getElementById('errorMsg').style.display = 'block';
    console.error('跳转错误:', err);
  });
</script>
</body>
</html>
